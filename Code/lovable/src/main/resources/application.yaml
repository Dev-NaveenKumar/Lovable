spring:
  application:
    name: lovable
    description: A code generation app

  datasource:
    url: jdbc:postgresql://localhost:5432/lovable
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

